services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-solbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-solbot}
    ports:
      - "5432:5432"
    volumes:
      - solbot-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solbot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  solbot-postgres:
